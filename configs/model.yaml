embedding:
  model: "BAAI/bge-small-en-v1.5"
  batch_size: 32
  max_length: 512

reranker:
  model: "BAAI/bge-reranker-base"
  max_length: 512

generation:
  provider: "ollama"
  ollama:
    base_url: "http://host.docker.internal:11434"
    model: "qwen2.5:7b"
    temperature: 0.1
    max_tokens: 2048
  openai:
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o-mini"
    temperature: 0.1
    max_tokens: 2048

faiss:
  index_path: "/app/data/processed/faiss"
  nprobe: 10
