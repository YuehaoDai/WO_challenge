services:
  # Offline data ingestion — runs once then exits
  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    volumes:
      - ./data:/app/data
      - model-cache:/root/.cache
    environment:
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      - RERANKER_MODEL=${RERANKER_MODEL:-BAAI/bge-reranker-base}
      - DB_PATH=/app/data/processed/app.db
      - FAISS_INDEX_PATH=/app/data/processed/faiss

  # Python model & data service
  python-service:
    build:
      context: ./python-service
    volumes:
      - ./data:/app/data
      - model-cache:/root/.cache
    ports:
      - "${PYTHON_SERVICE_PORT:-8000}:8000"
    environment:
      - HF_HUB_OFFLINE=1
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      - RERANKER_MODEL=${RERANKER_MODEL:-BAAI/bge-reranker-base}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - DB_PATH=/app/data/processed/app.db
      - FAISS_INDEX_PATH=/app/data/processed/faiss
    depends_on:
      ingest:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # Go API gateway / orchestrator
  go-backend:
    build:
      context: ./go-backend
    volumes:
      - ./data/processed:/app/data/processed:ro
      - ./configs:/app/configs:ro
    ports:
      - "${GO_BACKEND_PORT:-8080}:8080"
    environment:
      - CONFIG_PATH=/app/configs/app.yaml
    depends_on:
      python-service:
        condition: service_started

  # Vue frontend (nginx)
  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - go-backend

volumes:
  model-cache:
